name: Generate Android Keystore

# One-time helper: creates a release keystore.jks + prints the base64 blob
# and the four ANDROID_* secrets you paste into repo settings.
#
# LOSE THIS KEYSTORE = you can never update the Play Store app. Save it
# somewhere safe (1Password + offline copy).

on:
  workflow_dispatch:
    inputs:
      cn:
        description: "Certificate CN (your name or org)"
        required: true
        default: "Beekeeper"
      org:
        description: "Organization"
        required: true
        default: "Honest Money"
      country:
        description: "Country code"
        required: true
        default: "US"

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate keystore
        run: |
          PW=$(openssl rand -base64 24 | tr -d '=+/' | cut -c1-24)
          ALIAS="beekeeper"
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 4096 -validity 10950 \
            -storepass "$PW" -keypass "$PW" \
            -dname "CN=${{ github.event.inputs.cn }}, O=${{ github.event.inputs.org }}, C=${{ github.event.inputs.country }}"
          echo "PW=$PW" >> $GITHUB_ENV
          echo "ALIAS=$ALIAS" >> $GITHUB_ENV

      - name: Print secrets (redacted in logs — download artifact for values)
        run: |
          B64=$(base64 -w0 keystore.jks)
          {
            echo "=========================================="
            echo "Paste these into repo Settings → Secrets → Actions:"
            echo ""
            echo "ANDROID_KEYSTORE_BASE64:"
            echo "$B64"
            echo ""
            echo "ANDROID_STORE_PASSWORD: $PW"
            echo "ANDROID_KEY_PASSWORD:   $PW"
            echo "ANDROID_KEY_ALIAS:      $ALIAS"
            echo "=========================================="
          } > secrets.txt
          echo "::add-mask::$PW"
          echo "::add-mask::$B64"

      - uses: actions/upload-artifact@v4
        with:
          name: beekeeper-keystore-KEEP-SAFE
          path: |
            keystore.jks
            secrets.txt
