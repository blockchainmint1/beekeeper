<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Honest Money</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="" width="32" height="32" />
    <div>
      <h1>Honest Money</h1>
      <p id="status">Loading…</p>
    </div>
  </header>

  <section class="card">
    <label for="walletUrl">Paired wallet</label>
    <input id="walletUrl" type="url" spellcheck="false" />
    <button id="save">Save</button>
  </section>

  <section class="card">
    <button id="openWallet" class="primary">Open wallet</button>
    <button id="pair">Pair with this browser</button>
  </section>

  <footer>
    <span id="version"></span>
    <a id="docs" href="https://wallet.honest.money/extension" target="_blank">Docs</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
